spring.application.name=backend

# Server Configuration
server.port=${PORT:8080}

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/findwarranty}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Google Gemini API (najjeftiniji model za prepoznavanje računa)
gemini.api.key=${GEMINI_API_KEY}

# Qwen API (OpenAI-compatible)
qwen.api.key=${QWEN_API_KEY}
qwen.api.base-url=${QWEN_API_BASE_URL:https://api.openai.com/v1}
qwen.model-name=${QWEN_MODEL_NAME:qwen3-32b}
